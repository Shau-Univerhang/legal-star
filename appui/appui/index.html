<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>法智星 - 法律知识学习平台</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            background: #1E272E;
            color: #FFE8D6;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .card {
            background: rgba(44, 62, 80, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 232, 214, 0.3);
            border-radius: 1rem;
            padding: 2.5rem;
            text-align: center;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.35);
        }
        .logo {
            width: 64px;
            height: 64px;
            margin: 0 auto 1rem;
            background: linear-gradient(135deg, #E67E22, #34495E);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.75rem;
        }
        .title {
            background: linear-gradient(135deg, #FAE9DB, #F48224);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            color: #B2BEC3;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }
        .btn {
            display: inline-block;
            width: 100%;
            padding: 0.875rem 1.5rem;
            background: linear-gradient(90deg, #E67E22, #34495E);
            color: #fff;
            text-decoration: none;
            border-radius: 0.5rem;
            font-weight: 600;
            font-size: 1rem;
            transition: opacity 0.2s, transform 0.2s;
        }
        .btn:hover {
            opacity: 0.95;
            transform: translateY(-1px);
        }
        .links {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255, 232, 214, 0.2);
        }
        .links p {
            color: #B2BEC3;
            font-size: 0.8rem;
            margin-bottom: 0.75rem;
        }
        .links a {
            display: block;
            color: #FFE8D6;
            text-decoration: none;
            font-size: 0.9rem;
            padding: 0.4rem 0;
            opacity: 0.9;
        }
        .links a:hover {
            color: #E67E22;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo" aria-hidden="true">⚖</div>
        <h1 class="title">法智星</h1>
        <p class="subtitle">法律知识学习平台</p>
        <a href="P-HOME.html" class="btn">进入平台</a>
        <div class="links">
            <p>快速入口</p>
            <a href="P-HOME.html">首页</a>
            <a href="P-CASE_LIST.html">案例库</a>
            <a href="P-RANKING.html">排行榜</a>
            <a href="P-LOGIN.html">登录</a>
            <a href="P-REGISTER.html">注册</a>
        </div>
    </div>
</body>
</html>

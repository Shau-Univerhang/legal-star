        .glass-nav {

        .tab-inactive:hover {

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 解析URL参数的辅助函数
            function getUrlParams() {
                const params = {};
                const queryString = window.location.search.substring(1);
                const urlParams = new URLSearchParams(queryString);
                
                for(const [key, value] of urlParams.entries()) {
                    params[key] = value;
                }
                return params;
            }

            // 获取URL参数
            const params = getUrlParams();
            const keyword = params.keyword || '劳动法';
            let currentCategory = 'all';
            let currentPage = 1;
            const pageSize = 10;

            // 更新页面显示的关键词
            document.querySelector('#search-keyword').textContent = keyword;
            document.querySelector('#global-search').value = keyword;

            // 模拟搜索结果数据
            const mockResults = {
                all: [
                    {
                        id: 'case1',
                        type: 'cases',
                        title: '劳动合同纠纷案例：<span class="search-highlight">劳动法</span>维权成功案例',
                        summary: '某公司未签订劳动合同，员工依据<span class="search-highlight">劳动法</span>相关规定成功维权，获得双倍工资赔偿...',
                        source: '案例库',
                        time: '2024-01-15',
                        relevance: 95
                    },
                    {
                        id: 'material1',
                        type: 'materials',
                        title: '<span class="search-highlight">劳动法</span>律条文完整版',
                        summary: '最新<span class="search-highlight">劳动法</span>律法规全文，包含劳动合同、工资福利、社会保险等重要内容...',
                        source: '学习资料',
                        time: '2024-01-08',
                        relevance: 88
                    },
                    {
                        id: 'post1',
                        type: 'posts',
                        title: '求助：<span class="search-highlight">劳动法</span>规定的加班工资计算方式',
                        summary: '想了解<span class="search-highlight">劳动法</span>中关于加班工资的具体计算方法，特别是节假日加班的规定...',
                        source: '职场权益保护圈',
                        time: '2024-01-16',
                        relevance: 85
                    },
                    {
                        id: 'case2',
                        type: 'cases',
                        title: '试用期解雇争议：<span class="search-highlight">劳动法</span>如何保护劳动者',
                        summary: '试用期内被无故解雇，通过<span class="search-highlight">劳动法</span>维权获得经济补偿的典型案例...',
                        source: '案例库',
                        time: '2024-01-12',
                        relevance: 82
                    }
                ],
                cases: [
                    {
                        id: 'case1',
                        type: 'cases',
                        title: '劳动合同纠纷案例：<span class="search-highlight">劳动法</span>维权成功案例',
                        summary: '某公司未签订劳动合同，员工依据<span class="search-highlight">劳动法</span>相关规定成功维权，获得双倍工资赔偿...',
                        source: '案例库',
                        time: '2024-01-15',
                        relevance: 95
                    },
                    {
                        id: 'case2',
                        type: 'cases',
                        title: '试用期解雇争议：<span class="search-highlight">劳动法</span>如何保护劳动者',
                        summary: '试用期内被无故解雇，通过<span class="search-highlight">劳动法</span>维权获得经济补偿的典型案例...',
                        source: '案例库',
                        time: '2024-01-12',
                        relevance: 82
                    }
                ],
                materials: [
                    {
                        id: 'material1',
                        type: 'materials',
                        title: '<span class="search-highlight">劳动法</span>律条文完整版',
                        summary: '最新<span class="search-highlight">劳动法</span>律法规全文，包含劳动合同、工资福利、社会保险等重要内容...',
                        source: '学习资料',
                        time: '2024-01-08',
                        relevance: 88
                    }
                ],
                posts: [
                    {
                        id: 'post1',
                        type: 'posts',
                        title: '求助：<span class="search-highlight">劳动法</span>规定的加班工资计算方式',
                        summary: '想了解<span class="search-highlight">劳动法</span>中关于加班工资的具体计算方法，特别是节假日加班的规定...',
                        source: '职场权益保护圈',
                        time: '2024-01-16',
                        relevance: 85
                    }
                ]
            };

            // 渲染搜索结果
            function renderResults(category = 'all', page = 1) {
                const results = mockResults[category] || [];
                const startIndex = (page - 1) * pageSize;
                const endIndex = startIndex + pageSize;
                const pageResults = results.slice(startIndex, endIndex);
                
                const container = document.querySelector('#results-container');
                const noResults = document.querySelector('#no-results');
                
                if (pageResults.length === 0) {
                    container.innerHTML = '';
                    noResults.classList.remove('hidden');
                    return;
                }
                
                noResults.classList.add('hidden');
                
                container.innerHTML = pageResults.map(result => `
                    <div class="glass-card rounded-xl p-6 hover-glow cursor-pointer" data-id="${result.id}" data-type="${result.type}">
                        <div class="flex items-start space-x-4">
                            <div class="w-12 h-12 bg-gradient-to-br ${getTypeColor(result.type)} rounded-lg flex items-center justify-center flex-shrink-0">
                                <i class="${getTypeIcon(result.type)} text-white"></i>
                            </div>
                            <div class="flex-1">
                                <div class="flex items-center space-x-2 mb-2">
                                    <h4 class="font-semibold text-primary text-lg leading-relaxed">${result.title}</h4>
                                    <span class="text-xs bg-secondary bg-opacity-20 text-secondary px-2 py-1 rounded">${getTypeName(result.type)}</span>
                                </div>
                                <p class="text-sm text-text-secondary mb-3 leading-relaxed">${result.summary}</p>
                                <div class="flex items-center justify-between">
                                    <div class="flex items-center space-x-4 text-xs text-text-secondary">
                                        <span><i class="fas fa-map-marker-alt mr-1"></i>${result.source}</span>
                                        <span><i class="fas fa-clock mr-1"></i>${result.time}</span>
                                        <span><i class="fas fa-fire mr-1"></i>相关度 ${result.relevance}%</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('');
                
                // 添加点击事件
                container.querySelectorAll('.glass-card').forEach(card => {
                    card.addEventListener('click', function() {
                        const id = this.dataset.id;
                        const type = this.dataset.type;
                        handleResultClick(id, type);
                    });
                });
                
                // 更新分页信息
                updatePagination(results.length, page);
            }

            // 获取类型对应的颜色
            function getTypeColor(type) {
                const colors = {
                    cases: 'from-secondary to-accent',
                    materials: 'from-primary to-secondary',
                    posts: 'from-secondary to-primary'
                };
                return colors[type] || 'from-secondary to-accent';
            }

            // 获取类型对应的图标
            function getTypeIcon(type) {
                const icons = {
                    cases: 'fas fa-briefcase',
                    materials: 'fas fa-book',
                    posts: 'fas fa-comments-alt'
                };
                return icons[type] || 'fas fa-search';
            }

            // 获取类型显示名称
            function getTypeName(type) {
                const names = {
                    cases: '案例',
                    materials: '学习资料',
                    posts: '讨论帖子'
                };
                return names[type] || '未知';
            }

            // 处理搜索结果点击
            function handleResultClick(id, type) {
                switch(type) {
                    case 'cases':
                        window.location.href = `P-CASE_DETAIL.html?caseId=${id}`;
                        break;
                    case 'materials':
                        window.location.href = `P-LEARNING_MATERIAL.html?materialId=${id}`;
                        break;
                    case 'posts':
                        window.location.href = `P-POST_DETAIL.html?postId=${id}`;
                        break;
                    default:
                        console.log('未知类型:', type);
                }
            }

            // 更新分页信息
            function updatePagination(totalItems, currentPage) {
                const totalPages = Math.ceil(totalItems / pageSize);
                const startItem = (currentPage - 1) * pageSize + 1;
                const endItem = Math.min(currentPage * pageSize, totalItems);
                
                document.querySelector('#page-start').textContent = startItem;
                document.querySelector('#page-end').textContent = endItem;
                document.querySelector('#total-items').textContent = totalItems;
                
                // 更新分页按钮状态
                const prevBtn = document.querySelector('#prev-page');
                const nextBtn = document.querySelector('#next-page');
                
                prevBtn.disabled = currentPage === 1;
                nextBtn.disabled = currentPage === totalPages;
                
                // 生成页码按钮
                generatePageNumbers(totalPages, currentPage);
            }

            // 生成页码按钮
            function generatePageNumbers(totalPages, currentPage) {
                const container = document.querySelector('#page-numbers');
                container.innerHTML = '';
                
                const maxVisiblePages = 5;
                let startPage = Math.max(1, currentPage - Math.floor(maxVisiblePages / 2));
                let endPage = Math.min(totalPages, startPage + maxVisiblePages - 1);
                
                if (endPage - startPage + 1 < maxVisiblePages) {
                    startPage = Math.max(1, endPage - maxVisiblePages + 1);
                }
                
                for (let i = startPage; i <= endPage; i++) {
                    const button = document.createElement('button');
                    button.className = `px-3 py-2 text-sm rounded-lg transition-all ${
                        i === currentPage 
                            ? 'bg-secondary text-white' 
                            : 'border border-glass-border text-text-secondary hover:text-primary hover:border-secondary'
                    }`;
                    button.textContent = i;
                    button.addEventListener('click', () => {
                        currentPage = i;
                        renderResults(currentCategory, currentPage);
                    });
                    container.appendChild(button);
                }
            }

            // 标签页切换事件
            const tabs = document.querySelectorAll('[data-category]');
            tabs.forEach(tab => {
                tab.addEventListener('click', function() {
                    const category = this.dataset.category;
                    currentCategory = category;
                    currentPage = 1;
                    
                    // 更新标签页样式
                    tabs.forEach(t => {
                        t.classList.remove('tab-active');
                        t.classList.add('tab-inactive');
                    });
                    this.classList.remove('tab-inactive');
                    this.classList.add('tab-active');
                    
                    // 重新渲染结果
                    renderResults(category, 1);
                });
            });

            // 分页按钮事件
            document.querySelector('#prev-page').addEventListener('click', function() {
                if (currentPage > 1) {
                    currentPage--;
                    renderResults(currentCategory, currentPage);
                }
            });

            document.querySelector('#next-page').addEventListener('click', function() {
                const totalItems = mockResults[currentCategory]?.length || 0;
                const totalPages = Math.ceil(totalItems / pageSize);
                if (currentPage < totalPages) {
                    currentPage++;
                    renderResults(currentCategory, currentPage);
                }
            });

            // 全局搜索事件
            document.querySelector('#global-search').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    const keyword = this.value.trim();
                    if (keyword) {
                        window.location.href = `P-SEARCH_RESULT.html?keyword=${encodeURIComponent(keyword)}`;
                    }
                }
            });

            document.querySelector('#nav-profile').addEventListener('click', function(e) {

            });

            document.querySelector('#nav-settings').addEventListener('click', function(e) {
                e.preventDefault();
                window.location.href = 'P-SETTINGS.html';
            });

            // 顶部导航事件
            document.querySelector('#main-nav a[href="P-HOME.html"]').addEventListener('click', function(e) {
                e.preventDefault();
                window.location.href = 'P-HOME.html';

            document.querySelector('#main-nav a[href="P-CASE_LIST.html"]').addEventListener('click', function(e) {

            // 初始化页面
            renderResults(currentCategory, currentPage);

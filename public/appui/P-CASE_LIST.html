<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="auth_guard.js"></script>
    <title>案例库 - 法智星</title>
    <script src="./P-CASE_LIST_files/tailwindcss.js.下载"></script>
    <script src="./P-CASE_LIST_files/all.min.js.下载" data-auto-replace-svg="nest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#FFE8D6', secondary: '#E67E22', accent: '#34495E', dark: '#1E272E',
                        'dark-card': '#2C3E50', 'dark-border': '#3D5A80', 'text-primary': '#FFE8D6',
                        'text-secondary': '#B2BEC3', 'glass-bg': 'rgba(44, 62, 80, 0.85)',
                        'glass-border': 'rgba(255, 232, 214, 0.3)'
                    }
                }
            }
        }
    </script>
    <style>
        /* Prevents the entire page from scrolling */
        body, html {
            overflow: hidden;
            height: 100%;
        }
        /* Original Glassmorphism Styles */
        .glass-card { background: rgba(44, 62, 80, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255, 232, 214, 0.3); }
        .glass-nav { background: rgba(30, 39, 46, 0.97); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255, 232, 214, 0.2); }
        .case-card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(0, 0, 0, 0.4); }
        .gradient-text { background: linear-gradient(135deg, #FAE9DB, #F48224); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* Layout for fixed sidebar and scrollable main content */
        .main-container {
            display: flex;
            height: 100vh;
            padding-top: 4rem; /* Height of top nav */
        }

        #main-content {
            flex: 1;
            margin-left: 16rem; /* Offset for the fixed sidebar */
            height: calc(100vh - 4rem);
            overflow-y: auto; /* This is the key: makes ONLY this area scrollable */
            padding: 2rem;
        }
        /* Sticky header and toolbar inside the scrollable main content */
        #page-header {
            position: sticky;
            top: -2rem; /* Negative padding to stick at the very top */
            background: #1E272E; /* Opaque background to prevent overlap */
            padding-top: 2rem;
            padding-bottom: 1rem;
            z-index: 20;
        }
        #toolbar {
            position: sticky;
            top: 92px; /* Approx height of the header above it */
            z-index: 20;
        }
    </style>
</head>
<body class="bg-dark text-text-primary">

    <!-- Top Nav - Fixed -->
    <nav id="top-nav" class="glass-nav fixed top-0 left-0 right-0 z-50 h-16">
        <div class="flex items-center justify-between h-full px-6">
            <!-- Logo区域 -->
            <div id="logo-section" class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-gradient-to-br from-secondary to-accent rounded-lg flex items-center justify-center">
                    <i class="fas fa-scale-balanced text-lg text-white"></i>
                </div>
                <h1 class="text-xl font-bold gradient-text">法智星</h1>
            </div>

            <!-- 搜索框和用户区域 -->
            <div id="user-section" class="flex items-center space-x-4">


                <!-- 消息通知 -->
                <button
                    id="notification-btn"
                    class="relative p-2 text-text-secondary hover:text-primary transition-colors"
                >
                    <i class="fas fa-bell text-xl"></i>
                    <span
                        class="absolute top-1 right-1 w-2 h-2 bg-secondary rounded-full"
                    ></span>
                </button>

                <!-- 用户区域 -->
                <div id="auth-section"></div>
            </div>
        </div>
    </nav>

    <div class="main-container">
        <!-- Sidebar - Fixed -->
        <aside id="sidebar" class="glass-sidebar w-64 min-h-screen p-6 fixed left-0 top-16 bottom-0 overflow-y-auto">
            <nav id="sidebar-nav" class="space-y-2">
                <a href="P-HOME.html" id="nav-home" class="flex items-center space-x-3 px-4 py-3 rounded-lg text-text-secondary hover:text-primary hover:bg-glass-bg transition-all">
                    <i class="fas fa-house text-lg"></i>
                    <span>首页</span>
                </a>
                <a href="P-CASE_LIST.html" id="nav-cases" class="flex items-center space-x-3 px-4 py-3 rounded-lg bg-secondary bg-opacity-20 text-primary border border-secondary border-opacity-30 shadow-md">
                    <i class="fas fa-briefcase text-lg"></i>
                    <span>案例库</span>
                </a>
                <a href="P-AI_CHAT.html" id="nav-ai" class="flex items-center space-x-3 px-4 py-3 rounded-lg text-text-secondary hover:text-primary hover:bg-glass-bg transition-all">
                    <i class="fas fa-robot text-lg"></i>
                    <span>AI咨询</span>
                </a>
                <a href="P-RANKING.html" id="nav-ranking" class="flex items-center space-x-3 px-4 py-3 rounded-lg text-text-secondary hover:text-primary hover:bg-glass-bg transition-all">
                    <i class="fas fa-trophy text-lg"></i>
                    <span>排行榜</span>
                </a>
                <div class="border-t border-dark-border my-4"></div>
                <a href="P-USER_CENTER.html" id="nav-profile" class="flex items-center space-x-3 px-4 py-3 rounded-lg text-text-secondary hover:text-primary hover:bg-glass-bg transition-all">
                    <i class="fas fa-user text-lg"></i>
                    <span>个人中心</span>
                </a>
                <a href="P-SETTINGS.html" id="nav-settings" class="flex items-center space-x-3 px-4 py-3 rounded-lg text-text-secondary hover:text-primary hover:bg-glass-bg transition-all">
                    <i class="fas fa-gear text-lg"></i>
                    <span>设置</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content - The ONLY Scrollable Area -->
        <main id="main-content">
            
            <!-- Sticky Header inside main content -->
            <header id="page-header" class="mb-8">
                <div class="flex items-center justify-between">
                    <div>
                        <h2 class="text-3xl font-bold gradient-text mb-2">案例库</h2>
                        <nav class="text-sm text-text-secondary"><a href="P-HOME.html" class="hover:text-primary">首页</a> <span class="mx-2">/</span> <span class="text-primary">案例库</span></nav>
                    </div>
                    <div class="text-right">
                        <div class="text-sm text-text-secondary">共找到</div>
                        <div class="text-lg font-semibold text-secondary" id="case-total-count">- 个案例</div>
                    </div>
                </div>
            </header>

            <!-- Sticky Toolbar inside main content -->
            <section id="toolbar" class="glass-card rounded-xl p-6 mb-8">
                 <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div class="lg:col-span-1">
                        <div class="relative">
                            <input type="text" id="case-search" placeholder="搜索案例标题或关键词..." class="w-full px-4 py-3 bg-dark-card border border-glass-border rounded-lg focus:outline-none focus:border-secondary">
                            <button id="search-btn" class="absolute right-3 top-1/2 transform -translate-y-1/2 text-text-secondary hover:text-secondary">
                                <i class="fas fa-magnifying-glass"></i>
                            </button>
                        </div>
                    </div>
                    <div class="lg:col-span-2">
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-text-secondary mb-2">法律领域</label>
                                <select id="field-filter" class="w-full px-3 py-2 bg-dark-card border border-glass-border rounded-lg focus:outline-none focus:border-secondary">
                                    <option value="">全部领域</option>
                                    <option value="labor_law">劳动法</option>
                                    <option value="marriage_family">婚姻家庭</option>
                                    <option value="contract_law">合同法</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-text-secondary mb-2">难度级别</label>
                                <select id="difficulty-filter" class="w-full px-3 py-2 bg-dark-card border border-glass-border rounded-lg focus:outline-none focus:border-secondary">
                                    <option value="">全部难度</option>
                                    <option value="beginner">入门</option>
                                    <option value="intermediate">进阶</option>
                                    <option value="expert">专家</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-text-secondary mb-2">排序方式</label>
                                <select id="sort-filter" class="w-full px-3 py-2 bg-dark-card border border-glass-border rounded-lg focus:outline-none focus:border-secondary">
                                    <option value="recommend">推荐</option>
                                    <option value="latest">最新</option>
                                    <option value="popular">最热</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Case List Grid - This part will scroll -->
            <section id="case-list">
                <div id="case-list-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <!-- Case cards injected here -->
                </div>
                <div id="case-list-loading" class="text-center py-8 text-text-secondary">正在加载案例...</div>
                <div id="case-list-error" class="hidden text-center py-8 text-red-400"></div>
            </section>

        </main>
    </div>

    <script src="api.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        const mainContent = document.getElementById('main-content');
        let state = { page: 1, pageSize: 12, hasMore: true, loading: false, field: '', difficulty: '', sort: 'recommend', keyword: '' };

        const difficultyLabels = { beginner: '入门', intermediate: '进阶', expert: '专家' };
        const fieldLabels = { labor_law: '劳动法', marriage_family: '婚姻家庭', contract_law: '合同法' };

        function formatLearnerCount(n) {
            if (n >= 10000) return (n / 10000).toFixed(1) + '万';
            if (n >= 1000) return (n / 1000).toFixed(1) + '千';
            return n;
        }

        function renderCaseCards(cases, append = false) {
            const grid = document.getElementById('case-list-grid');
            if (!grid) return;

            const newHtml = cases.map(c => {
                const caseId = c.slug || c.id;
                const fieldLabel = fieldLabels[c.field] || '';
                const diffLabel = difficultyLabels[c.difficulty] || '';
                const fieldTag = fieldLabel ? `<span class="text-xs bg-secondary bg-opacity-20 text-secondary px-2 py-1 rounded">${fieldLabel}</span>` : '';
                const keywordTags = (c.keywords || []).slice(0, 2).map(k => `<span class="text-xs bg-primary bg-opacity-10 text-primary px-2 py-1 rounded">${k}</span>`).join(' ');

                return `
                    <div class="case-card glass-card rounded-xl p-6 transition-all cursor-pointer" onclick="window.location.href='P-CASE_DETAIL.html?caseId=${encodeURIComponent(caseId)}'">
                        <div class="flex items-start space-x-4 mb-4">
                            <div class="w-12 h-12 bg-gradient-to-br from-secondary to-accent rounded-lg flex items-center justify-center"><i class="text-white fas fa-gavel"></i></div>
                            <div class="flex-1">
                                <h3 class="font-semibold text-primary mb-1">${c.title || '无标题'}</h3>
                                <p class="text-sm text-text-secondary">${c.summary || '无摘要'}</p>
                            </div>
                        </div>
                        <div class="flex flex-wrap gap-2 mb-4">${fieldTag} ${keywordTags}</div>
                        <div class="flex items-center justify-between text-sm text-text-secondary">
                            <div class="flex items-center space-x-4">
                                <span class="flex items-center"><i class="mr-1 fas fa-signal"></i>${diffLabel}</span>
                                <span class="flex items-center"><i class="mr-1 fas fa-users"></i>${formatLearnerCount(c.learner_count || 0)}</span>
                            </div>
                            <span class="flex items-center"><i class="mr-1 fas fa-clock"></i>${c.study_time_minutes || 0}分钟</span>
                        </div>
                    </div>`;
            }).join('');

            if (append) {
                grid.insertAdjacentHTML('beforeend', newHtml);
            } else {
                grid.innerHTML = newHtml;
            }
        }

        function loadCases(append = false) {
            if (state.loading) return;
            state.loading = true;
            const loadingEl = document.getElementById('case-list-loading');
            if (loadingEl) loadingEl.style.display = 'block';

            window.fetchCases({ ...state })
                .then(res => {
                    renderCaseCards(res.data || [], append);
                    const total = res.total || 0;
                    document.getElementById('case-total-count').textContent = `${total} 个案例`;
                    state.hasMore = (state.page * state.pageSize) < total;
                    if (!state.hasMore && loadingEl) {
                        loadingEl.textContent = '已加载全部案例';
                    } else if (loadingEl) {
                        loadingEl.textContent = '正在加载案例...';
                    }
                })
                .catch(e => {
                    const errEl = document.getElementById('case-list-error');
                    if(errEl) errEl.textContent = `加载失败: ${e.message}`;
                })
                .finally(() => {
                    state.loading = false;
                    if (!state.hasMore && loadingEl) {
                       setTimeout(() => { loadingEl.style.display = 'none'; }, 2000);
                    }
                });
        }

        function setupEventListeners() {
            const caseSearch = document.getElementById('case-search');
            const searchBtn = document.getElementById('search-btn');
            const fieldFilter = document.getElementById('field-filter');
            const difficultyFilter = document.getElementById('difficulty-filter');
            const sortFilter = document.getElementById('sort-filter');

            function resetAndLoad() {
                state.page = 1;
                state.hasMore = true;
                mainContent.scrollTop = 0;
                loadCases(false);
            }

            searchBtn.addEventListener('click', () => {
                state.keyword = caseSearch.value.trim();
                resetAndLoad();
            });
            caseSearch.addEventListener('keypress', e => {
                if (e.key === 'Enter') {
                    state.keyword = caseSearch.value.trim();
                    resetAndLoad();
                }
            });
            
            [fieldFilter, difficultyFilter, sortFilter].forEach(filter => {
                filter.addEventListener('change', () => {
                    state.field = fieldFilter.value;
                    state.difficulty = difficultyFilter.value;
                    state.sort = sortFilter.value;
                    resetAndLoad();
                });
            });

            mainContent.addEventListener('scroll', () => {
                if (state.loading || !state.hasMore) return;
                // Check if scroll is near the bottom of the main-content container
                if (mainContent.scrollHeight - mainContent.scrollTop - mainContent.clientHeight < 500) {
                    state.page++;
                    loadCases(true);
                }
            }, { passive: true });
        }

        loadCases();
        setupEventListeners();
    });
    </script>
</body>
</html>

        document.addEventListener('DOMContentLoaded', function() {
            // 搜索框焦点效果
            const searchInput = document.querySelector('#global-search');
            searchInput.addEventListener('focus', function() {
                this.parentElement.classList.add('ring-2', 'ring-secondary', 'ring-opacity-50');
            });
            searchInput.addEventListener('blur', function() {
                this.parentElement.classList.remove('ring-2', 'ring-secondary', 'ring-opacity-50');
            });

            // 搜索功能
            searchInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    const keyword = this.value.trim();
                    if (keyword) {
                        window.location.href = `P-SEARCH_RESULT.html?keyword=${encodeURIComponent(keyword)}`;
                    }
                }
            });

            // 知识点节点点击事件
            const knowledgeNodes = document.querySelectorAll('.knowledge-node');
            knowledgeNodes.forEach(node => {
                node.addEventListener('click', function() {
                    const knowledgeId = this.dataset.knowledgeId;
                    showKnowledgeDetail(knowledgeId);
                    
                    // 移除其他节点的激活状态
                    knowledgeNodes.forEach(n => n.classList.remove('active'));
                    // 添加当前节点的激活状态
                    this.classList.add('active');
                });
            });

            // 显示知识点详情
            function showKnowledgeDetail(knowledgeId) {
                const knowledge = knowledgeData[knowledgeId];
                if (!knowledge) return;

                // 隐藏默认提示
                document.querySelector('#default-detail').classList.add('hidden');
                // 显示详情内容
                document.querySelector('#node-detail').classList.remove('hidden');

                // 填充详情内容
                document.querySelector('#detail-title').textContent = knowledge.title;
                document.querySelector('#detail-description').textContent = knowledge.description;

                // 填充关联案例
                const relatedCasesContainer = document.querySelector('#related-cases');
                relatedCasesContainer.innerHTML = '';
                knowledge.relatedCases.forEach((caseName, index) => {
                    const caseElement = document.createElement('div');
                    caseElement.className = 'flex items-center space-x-2 text-sm';
                    caseElement.innerHTML = `
                        <i class="fas fa-briefcase text-secondary text-xs"></i>
                        <a href="P-CASE_DETAIL.html?caseId=case-${knowledgeId}-${index}" class="text-text-secondary hover:text-primary transition-colors">${caseName}</a>
                    `;
                    relatedCasesContainer.appendChild(caseElement);
                });

                // 填充相关题目
                const relatedQuestionsContainer = document.querySelector('#related-questions');
                relatedQuestionsContainer.innerHTML = '';
                knowledge.relatedQuestions.forEach((questionName, index) => {
                    const questionElement = document.createElement('div');
                    questionElement.className = 'flex items-center space-x-2 text-sm';
                    questionElement.innerHTML = `
                        <i class="fas fa-question-circle text-secondary text-xs"></i>
                        <a href="P-QUESTION_BANK.html?questionId=question-${knowledgeId}-${index}" class="text-text-secondary hover:text-primary transition-colors">${questionName}</a>
                    `;
                    relatedQuestionsContainer.appendChild(questionElement);
                });

                // 填充相关标签
                const relatedTagsContainer = document.querySelector('#related-tags');
                relatedTagsContainer.innerHTML = '';
                knowledge.tags.forEach(tag => {
                    const tagElement = document.createElement('span');
                    tagElement.className = 'bg-secondary bg-opacity-20 text-secondary px-2 py-1 rounded text-xs';
                    tagElement.textContent = tag;
                    relatedTagsContainer.appendChild(tagElement);
                });
            }

            // 缩放控制
            let currentScale = 1;
            const scaleStep = 0.1;
            const minScale = 0.5;
            const maxScale = 2;

            document.querySelector('#zoom-in').addEventListener('click', function() {
                if (currentScale < maxScale) {
                    currentScale += scaleStep;
                    applyScale();
                }
            });

            document.querySelector('#zoom-out').addEventListener('click', function() {
                if (currentScale > minScale) {
                    currentScale -= scaleStep;
                    applyScale();
                }
            });

            document.querySelector('#reset-view').addEventListener('click', function() {
                currentScale = 1;
                applyScale();
                // 重置节点激活状态
                knowledgeNodes.forEach(n => n.classList.remove('active'));
                // 显示默认提示
                document.querySelector('#default-detail').classList.remove('hidden');
                document.querySelector('#node-detail').classList.add('hidden');
            });

            function applyScale() {
                const svg = document.querySelector('#knowledge-graph');
                svg.style.transform = `scale(${currentScale})`;
                svg.style.transformOrigin = 'center';
            }

            // 导航菜单点击事件
            document.querySelector('#nav-home').addEventListener('click', function(e) {
                e.preventDefault();
                window.location.href = 'P-HOME.html';
            });

            document.querySelector('#nav-cases').addEventListener('click', function(e) {
                e.preventDefault();
                window.location.href = 'P-CASE_LIST.html';
            });

            document.querySelector('#nav-circles').addEventListener('click', function(e) {
                e.preventDefault();
                window.location.href = 'P-CIRCLE_LIST.html';
            });

            document.querySelector('#nav-questions').addEventListener('click', function(e) {
                e.preventDefault();
                window.location.href = 'P-QUESTION_BANK.html';
            });

            document.querySelector('#nav-materials').addEventListener('click', function(e) {
                e.preventDefault();
                window.location.href = 'P-LEARNING_MATERIAL.html';
            });

            document.querySelector('#nav-ranking').addEventListener('click', function(e) {
                e.preventDefault();
                window.location.href = 'P-RANKING.html';
            });

            document.querySelector('#nav-profile').addEventListener('click', function(e) {
                e.preventDefault();
                window.location.href = 'P-USER_CENTER.html';
            });

            document.querySelector('#nav-settings').addEventListener('click', function(e) {
                e.preventDefault();
                window.location.href = 'P-SETTINGS.html';
            });

            // 用户头像点击事件
            document.querySelector('#user-avatar').addEventListener('click', function() {
                window.location.href = 'P-USER_CENTER.html';
            });

            // 主导航点击事件
            document.querySelector('#main-nav a[href="P-HOME.html"]').addEventListener('click', function(e) {
                e.preventDefault();
                window.location.href = 'P-HOME.html';
            });

            document.querySelector('#main-nav a[href="P-CASE_LIST.html"]').addEventListener('click', function(e) {
                e.preventDefault();
                window.location.href = 'P-CASE_LIST.html';
            });

            document.querySelector('#main-nav a[href="P-CIRCLE_LIST.html"]').addEventListener('click', function(e) {
                e.preventDefault();
                window.location.href = 'P-CIRCLE_LIST.html';
            });

            document.querySelector('#main-nav a[href="P-QUESTION_BANK.html"]').addEventListener('click', function(e) {
                e.preventDefault();
                window.location.href = 'P-QUESTION_BANK.html';
            });

            // 响应式处理
            function handleResize() {
                const width = window.innerWidth;
                const detailModal = document.querySelector('#detail-modal');
                const nodeDetail = document.querySelector('#node-detail');
                
                if (width < 768) {
                    // 移动端：隐藏右侧详情面板，使用模态框
                    document.querySelector('#knowledge-detail').classList.add('hidden');
                } else {
                    // 桌面端：显示右侧详情面板，隐藏模态框
                    document.querySelector('#knowledge-detail').classList.remove('hidden');
                    detailModal.classList.add('hidden');
                }
            }

            window.addEventListener('resize', handleResize);
            handleResize(); // 初始化调用
        });
    </script>

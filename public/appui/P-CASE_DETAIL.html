
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>案例详情 - 法智星</title>
    <script src="auth_guard.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#FFE8D6',
                        secondary: '#E67E22', 
                        accent: '#34495E',
                        dark: '#1E272E',
                        'dark-card': '#2C3E50',
                        'dark-border': '#3D5A80',
                        'text-primary': '#FFE8D6',
                        'text-secondary': '#B2BEC3',
                        'glass-bg': 'rgba(44, 62, 80, 0.85)',
                        'glass-border': 'rgba(255, 232, 214, 0.3)'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #1E272E;
            color: #FFE8D6;
        }
        .glass-card {
            background: rgba(44, 62, 80, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 232, 214, 0.3);
        }
        .prose {
            color: #B2BEC3;
        }
        .prose h2, .prose h3 {
            color: #FFE8D6;
        }
        .prose p, .prose ul, .prose ol, .prose blockquote {
            line-height: 1.8;
        }
        .prose br {
             content: "";
             display: block;
             margin-bottom: 1em;
        }
    </style>
</head>
<body class="min-h-screen">

    <div class="flex pt-16">
        <!-- Main Content Area -->
        <main class="flex-1 p-6 lg:p-8">
            <nav class="text-sm mb-4" id="breadcrumb">
                <a href="P-HOME.html" class="text-text-secondary hover:text-primary">首页</a>
                <span class="mx-2">/</span>
                <a href="P-CASE_LIST.html" class="text-text-secondary hover:text-primary">案例库</a>
                <span class="mx-2">/</span>
                <span id="breadcrumb-title" class="text-text-primary">...</span>
            </nav>

            <div class="glass-card rounded-xl p-6 lg:p-8">
                <!-- Header -->
                <div class="mb-6">
                    <h1 id="case-title" class="text-3xl font-bold text-text-primary mb-3">加载中...</h1>
                    <div id="case-tags" class="flex flex-wrap gap-2">
                        <!-- Tags will be dynamically inserted here -->
                    </div>
                </div>

                <!-- Video Player -->
                <div class="mb-8">
                    <div id="video-container" class="w-full bg-black rounded-lg overflow-hidden shadow-lg relative aspect-video flex items-center justify-center">
                        <!-- Video player will be dynamically inserted here -->
                    </div>
                </div>

                <!-- Case Details -->
                <div class="space-y-8">
                    <div>
                        <h2 class="text-xl font-semibold text-primary mb-3 flex items-center"><i class="fas fa-question-circle mr-2"></i> 核心问题</h2>
                        <div id="case-issue" class="prose max-w-none">
                            <p>加载中...</p>
                        </div>
                    </div>

                    <div>
                        <h2 class="text-xl font-semibold text-primary mb-3 flex items-center"><i class="fas fa-lightbulb mr-2"></i> 应对方法</h2>
                        <div id="case-methods" class="prose max-w-none">
                            <p>加载中...</p>
                        </div>
                    </div>

                    <div>
                        <h2 class="text-xl font-semibold text-primary mb-3 flex items-center"><i class="fas fa-balance-scale mr-2"></i> 相关法条</h2>
                        <div id="case-provisions" class="prose max-w-none">
                            <p>加载中...</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const params = new URLSearchParams(window.location.search);
    const caseId = params.get('caseId');

    const fieldLabels = {
        'consumer_rights': '消费者权益保护',
        'marriage_family': '婚姻家庭',
        'contract_law': '合同法',
        'labor_law': '劳动法',
        'social_security': '社会保障法',
        'civil_law': '民法',
        'criminal_law': '刑法',
        'administrative_law': '行政法',
        'tort_liability': '侵权责任',
        'civil_criminal': '民法与刑法',
        'food_safety': '食品安全'
    };

    function formatText(text) {
        if (!text) return '<p>暂无内容</p>';
        // With clean data from the DB, we can use the standard method.
        return text.replace(/\n/g, '<br>');
    }

    if (caseId) {
        fetch(`/api/cases/${caseId}`)
            .then(response => {
                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }
                return response.json();
            })
            .then(data => {
                document.title = `${data.title || '案例详情'} - 法智星`;
                document.getElementById('breadcrumb-title').textContent = data.title;
                document.getElementById('case-title').textContent = data.title;

                const tagsContainer = document.getElementById('case-tags');
                tagsContainer.innerHTML = '';

                if (data.field) {
                    const fieldTag = document.createElement('span');
                    fieldTag.className = 'text-xs bg-secondary bg-opacity-20 text-secondary px-2 py-1 rounded';
                    fieldTag.textContent = fieldLabels[data.field] || data.field;
                    tagsContainer.appendChild(fieldTag);
                }

                if (data.keywords && data.keywords.length > 0) {
                    data.keywords.forEach(keyword => {
                        const keywordTag = document.createElement('span');
                        keywordTag.className = 'text-xs bg-primary bg-opacity-10 text-primary px-2 py-1 rounded';
                        keywordTag.textContent = keyword;
                        tagsContainer.appendChild(keywordTag);
                    });
                }

                const videoContainer = document.getElementById('video-container');
                videoContainer.innerHTML = ''; // Clear previous content

                if (data.video_url && data.video_url.includes('bilibili.com')) {
                    try {
                        const url = new URL(data.video_url);
                        const pathSegments = url.pathname.split('/');
                        const bvid = pathSegments.find(s => s.startsWith('BV'));

                        if (bvid) {
                            const iframe = document.createElement('iframe');
                            iframe.src = `//player.bilibili.com/player.html?bvid=${bvid}`;
                            iframe.className = 'w-full h-full absolute top-0 left-0';
                            iframe.setAttribute('frameborder', '0');
                            iframe.setAttribute('allowfullscreen', 'true');
                            videoContainer.appendChild(iframe);
                        } else {
                            throw new Error('BVID not found in URL');
                        }
                    } catch (e) {
                        videoContainer.innerHTML = '<p class="text-center text-text-secondary">无法解析视频链接</p>';
                    }
                } else if (data.video_url) {
                    const video = document.createElement('video');
                    video.src = data.video_url;
                    video.className = 'w-full h-full object-contain';
                    video.controls = true;
                    videoContainer.appendChild(video);
                } else {
                    videoContainer.innerHTML = '<p class="text-center text-text-secondary">暂无视频</p>';
                }
                
                document.getElementById('case-issue').innerHTML = formatText(data.description);
                document.getElementById('case-methods').innerHTML = formatText(data.coping_methods);
                document.getElementById('case-provisions').innerHTML = formatText(data.legal_provisions);

            })
            .catch(error => {
                console.error('Error fetching case data:', error);
                document.getElementById('case-title').textContent = '案例加载失败';
                document.getElementById('case-issue').textContent = '无法加载案例详情，请稍后再试。';
                document.getElementById('case-methods').textContent = '';
                document.getElementById('case-provisions').textContent = '';
            });
    } else {
        document.getElementById('case-title').textContent = '未指定案例';
        document.getElementById('case-issue').textContent = '请返回案例库选择一个案例查看。';
        document.getElementById('case-methods').textContent = '';
        document.getElementById('case-provisions').textContent = '';
    }
});
</script>

</body>
</html>

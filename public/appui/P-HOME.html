                <div class="glass-card rounded-xl p-6 shadow-lg">
                    <div id="daily-case-body" class="space-y-4 text-sm text-text-secondary">
                       <p>加载中...</p>
                    </div>
                </div>
            </section>

            <!-- 学习概览（移至页面末尾） -->
            <section id="learning-overview" class="glass-card rounded-xl p-6 mb-8 shadow-lg">
                <h3 class="text-xl font-semibold text-primary mb-6 flex items-center">
                    <i class="mr-2 text-secondary" data-fa-i2svg=""><svg class="svg-inline--fa fa-chart-line" aria-hidden="true" focusable="false" data-prefix="fas" data-icon="chart-line" role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" data-fa-i2svg=""><path fill="currentColor" d="M64 64c0-17.7-14.3-32-32-32S0 46.3 0 64L0 400c0 44.2 35.8 80 80 80l400 0c17.7 0 32-14.3 32-32s-14.3-32-32-32L80 416c-8.8 0-16-7.2-16-16L64 64zm406.6 86.6c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0L320 210.7l-57.4-57.4c-12.5-12.5-32.8-12.5-45.3 0l-112 112c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0L240 221.3l57.4 57.4c12.5 12.5 32.8 12.5 45.3 0l128-128z"></path></svg></i>学习概览
                </h3>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                    <div id="stat-total-time" class="text-center p-4 bg-dark rounded-lg">
                        <div class="text-3xl font-bold text-secondary mb-2">128</div>
                        <div class="text-sm text-text-secondary">总学习时长(小时)</div>
                    </div>
                    <div id="stat-learned-cases" class="text-center p-4 bg-dark rounded-lg">
                        <div class="text-3xl font-bold text-accent mb-2">45</div>
                        <div class="text-sm text-text-secondary">已学案例数</div>
                    </div>
                    <div id="stat-current-rank" class="text-center p-4 bg-dark rounded-lg">
                        <div class="text-3xl font-bold text-primary mb-2">Lv.5</div>
                        <div class="text-sm text-text-secondary">当前段位</div>
                    </div>
                    <div id="stat-streak-days" class="text-center p-4 bg-dark rounded-lg">
                        <div class="text-3xl font-bold text-secondary mb-2">12</div>
                        <div class="text-sm text-text-secondary">连续学习天数</div>
                    </div>
                </div>
            </section>

            <!-- 段位进度（移至页面末尾） -->
            <section id="rank-progress" class="glass-card rounded-xl p-6 shadow-lg">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-xl font-semibold text-primary flex items-center">
                        <i class="mr-2 text-secondary" data-fa-i2svg=""><svg class="svg-inline--fa fa-trophy" aria-hidden="true" focusable="false" data-prefix="fas" data-icon="trophy" role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 576 512" data-fa-i2svg=""><path fill="currentColor" d="M400 0L176 0c-26.5 0-48.1 21.8-47.1 48.2c.2 5.3 .4 10.6 .7 15.8L24 64C10.7 64 0 74.7 0 88c0 92.6 33.5 157 78.5 200.7c44.3 43.1 98.3 64.8 138.1 75.8c23.4 6.5 39.4 26 39.4 45.6c0 20.9-17 37.9-37.9 37.9L192 448c-17.7 0-32 14.3-32 32s14.3 32 32 32l192 0c17.7 0 32-14.3 32-32s-14.3-32-32-32l-26.1 0C337 448 320 431 320 410.1c0-19.6 15.9-39.2 39.4-45.6c39.9-11 93.9-32.7 138.2-75.8C542.5 245 576 180.6 576 88c0-13.3-10.7-24-24-24L446.4 64c.3-5.2 .5-10.4 .7-15.8C448.1 21.8 426.5 0 400 0zM48.9 112l84.4 0c9.1 90.1 29.2 150.3 51.9 190.6c-24.9-11-50.8-26.5-73.2-48.3c-32-31.1-58-76-63-142.3zM464.1 254.3c-22.4 21.8-48.3 37.3-73.2 48.3c22.7-40.3 42.8-100.5 51.9-190.6l84.4 0c-5.1 66.3-31.1 111.2-63 142.3z"></path></svg></i>段位进度
                    </h3>
                    <span class="text-sm text-text-secondary">法律达人 → 法智星大师</span>
                </div>
                <div class="w-full bg-dark-card rounded-full h-3 mb-4 p-0.5">
                    <div class="progress-bar h-full rounded-full" style="width: 65%"></div>
                </div>
                <div class="flex justify-between text-sm">
                    <span class="text-text-secondary">当前经验: 1,650</span>
                    <span class="text-text-secondary">还需: 850 经验升级</span>
                </div>
            </section>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const dailyCaseTitle = document.getElementById('daily-case-title');
            const dailyVideoContainer = document.getElementById('daily-video-container');
            const dailyCaseBody = document.getElementById('daily-case-body');
            const videoLoadingText = document.getElementById('video-loading-text');

            fetch('/api/daily-case')
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Failed to fetch daily case');
                    }
                    return response.json();
                })
                .then(data => {
                    if (!data) {
                        throw new Error('No data for daily case');
                    }

                    // Fill in the title
                    if (dailyCaseTitle) {
                        dailyCaseTitle.textContent = data.title;
                    }

                    // Fill in the body content (description, methods, provisions)
                    if (dailyCaseBody) {
                        const formatTextForHome = (text) => text ? text.replace(/\n/g, '<br>') : '暂无内容';

                        let bodyHtml = '';

                        if (data.description) {
                            bodyHtml += `
                                <div>
                                    <h4 class="font-semibold text-primary mb-2 flex items-center"><i class="fas fa-question-circle mr-2"></i> 核心问题</h4>
                                    <p>${formatTextForHome(data.description)}</p>
                                </div>`;
                        }
                        if (data.coping_methods) {
                            bodyHtml += `
                                <div>
                                    <h4 class="font-semibold text-primary mb-2 flex items-center"><i class="fas fa-lightbulb mr-2"></i> 应对方法</h4>
                                    <p>${formatTextForHome(data.coping_methods)}</p>
                                </div>`;
                        }
                        if (data.legal_provisions) {
                           bodyHtml += `
                                <div>
                                    <h4 class="font-semibold text-primary mb-2 flex items-center"><i class="fas fa-balance-scale mr-2"></i> 相关法条</h4>
                                    <p>${formatTextForHome(data.legal_provisions)}</p>
                                </div>`;
                        }

                        dailyCaseBody.innerHTML = bodyHtml || '<p>暂无内容详情</p>';
                    }

                    // Handle video display
                    if (dailyVideoContainer && data.video_url) {
                         if (videoLoadingText) videoLoadingText.style.display = 'none';

                        let videoPlayerHtml = '';
                        if (data.video_url.includes('bilibili.com')) {
                            try {
                                const url = new URL(data.video_url);
                                const pathSegments = url.pathname.split('/');
                                const bvid = pathSegments.find(s => s.startsWith('BV'));
                                if (bvid) {
                                    const iframeSrc = `//player.bilibili.com/player.html?bvid=${bvid}`;
                                    videoPlayerHtml = `<iframe class="w-full h-full absolute top-0 left-0" src="${iframeSrc}" frameborder="0" allowfullscreen></iframe>`;
                                } else {
                                    throw new Error('BVID not found');
                                }
                            } catch (e) {
                                videoPlayerHtml = '<p class="text-center text-text-secondary">无法解析B站视频链接</p>';
                            }
                        } else {
                            videoPlayerHtml = `<video src="${data.video_url}" class="w-full h-full object-contain" controls></video>`;
                        }
                        dailyVideoContainer.innerHTML = videoPlayerHtml;
                    } else {
                        if(videoLoadingText) videoLoadingText.textContent = '今日案例暂无视频';
                    }
                })
                .catch(error => {
                    console.error('Error loading daily case:', error);
                    if (dailyCaseTitle) dailyCaseTitle.textContent = '加载每日案例失败';
                    if (dailyCaseBody) dailyCaseBody.innerHTML = '<p>请稍后再试</p>';
                    if (videoLoadingText) videoLoadingText.textContent = '加载失败';
                });
        });
    </script>

</body></html>

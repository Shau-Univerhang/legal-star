                    <i class="mr-2 text-secondary" data-fa-i2svg=""><svg class="svg-inline--fa fa-chart-line" aria-hidden="true" focusable="false" data-prefix="fas" data-icon="chart-line" role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" data-fa-i2svg=""><path fill="currentColor" d="M64 64c0-17.7-14.3-32-32-32S0 46.3 0 64L0 400c0 44.2 35.8 80 80 80l400 0c17.7 0 32-14.3 32-32s-14.3-32-32-32L80 416c-8.8 0-16-7.2-16-16L64 64zm406.6 86.6c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0L320 210.7l-57.4-57.4c-12.5-12.5-32.8-12.5-45.3 0l-112 112c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0L240 221.3l57.4 57.4c12.5 12.5 32.8 12.5 45.3 0l128-128z"></path></svg></i>学习概览
                </h3>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                    <div id="stat-total-time" class="text-center p-4 bg-dark rounded-lg">
                        <div class="text-3xl font-bold text-secondary mb-2">128</div>
                        <div class="text-sm text-text-secondary">总学习时长(小时)</div>
                    </div>
                    <div id="stat-learned-cases" class="text-center p-4 bg-dark rounded-lg">
                        <div class="text-3xl font-bold text-accent mb-2">45</div>
                        <div class="text-sm text-text-secondary">已学案例数</div>
                    </div>
                    <div id="stat-current-rank" class="text-center p-4 bg-dark rounded-lg">
                        <div class="text-3xl font-bold text-primary mb-2">Lv.5</div>
                        <div class="text-sm text-text-secondary">当前段位</div>
                    </div>
                    <div id="stat-streak-days" class="text-center p-4 bg-dark rounded-lg">
                        <div class="text-3xl font-bold text-secondary mb-2">12</div>
                        <div class="text-sm text-text-secondary">连续学习天数</div>
                    </div>
                </div>
            </section>

            <!-- 段位进度（移至页面末尾） -->
            <section id="rank-progress" class="glass-card rounded-xl p-6 shadow-lg">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-xl font-semibold text-primary flex items-center">
                        <i class="mr-2 text-secondary" data-fa-i2svg=""><svg class="svg-inline--fa fa-trophy" aria-hidden="true" focusable="false" data-prefix="fas" data-icon="trophy" role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 576 512" data-fa-i2svg=""><path fill="currentColor" d="M400 0L176 0c-26.5 0-48.1 21.8-47.1 48.2c.2 5.3 .4 10.6 .7 15.8L24 64C10.7 64 0 74.7 0 88c0 92.6 33.5 157 78.5 200.7c44.3 43.1 98.3 64.8 138.1 75.8c23.4 6.5 39.4 26 39.4 45.6c0 20.9-17 37.9-37.9 37.9L192 448c-17.7 0-32 14.3-32 32s14.3 32 32 32l192 0c17.7 0 32-14.3 32-32s-14.3-32-32-32l-26.1 0C337 448 320 431 320 410.1c0-19.6 15.9-39.2 39.4-45.6c39.9-11 93.9-32.7 138.2-75.8C542.5 245 576 180.6 576 88c0-13.3-10.7-24-24-24L446.4 64c.3-5.2 .5-10.4 .7-15.8C448.1 21.8 426.5 0 400 0zM48.9 112l84.4 0c9.1 90.1 29.2 150.3 51.9 190.6c-24.9-11-50.8-26.5-73.2-48.3c-32-31.1-58-76-63-142.3zM464.1 254.3c-22.4 21.8-48.3 37.3-73.2 48.3c22.7-40.3 42.8-100.5 51.9-190.6l84.4 0c-5.1 66.3-31.1 111.2-63 142.3z"></path></svg></i>段位进度
                    </h3>
                    <span class="text-sm text-text-secondary">法律达人 → 法智星大师</span>
                </div>
                <div class="w-full bg-dark-card rounded-full h-3 mb-4 p-0.5">
                    <div class="progress-bar h-full rounded-full" style="width: 65%"></div>
                </div>
                <div class="flex justify-between text-sm">
                    <span class="text-text-secondary">当前经验: 1,650</span>
                    <span class="text-text-secondary">还需: 850 经验升级</span>
                </div>
            </section>
        </main>
    </div>

    <script src="api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Auth & User Interface Logic
            const authSection = document.getElementById('auth-section');
            
            if (window.auth && window.auth.isLoggedIn()) {
                // === Logged In State ===
                const user = window.auth.getUser();
                const name = user ? (user.user_metadata?.username || (user.email ? user.email.split('@')[0] : '学法者')) : '学法者';
                
                // Render User Avatar
                authSection.innerHTML = `
                    <div id="user-avatar" class="flex items-center space-x-2 cursor-pointer hover:opacity-80 transition-opacity">
                        <img src="./P-HOME_files/saved_resource" alt="用户头像" class="w-8 h-8 rounded-full border-2 border-secondary">
                        <span class="hidden md:block text-sm">${name}</span>
                        <i class="text-text-secondary text-xs" data-fa-i2svg=""><svg class="svg-inline--fa fa-chevron-down" aria-hidden="true" focusable="false" data-prefix="fas" data-icon="chevron-down" role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" data-fa-i2svg=""><path fill="currentColor" d="M233.4 406.6c12.5 12.5 32.8 12.5 45.3 0l192-192c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0L256 338.7 86.6 169.4c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3l192 192z"></path></svg></i>
                    </div>
                `;
                
                // Bind Logout Event
                document.getElementById('user-avatar').addEventListener('click', function() {
                    if (confirm('确定要退出登录吗？')) {
                        window.auth.logout();
                    }
                });
            } else {
                // === Not Logged In (Guest) State ===
                // Empty avatar + Login/Register links
                authSection.innerHTML = `
                    <div class="flex items-center space-x-3">
                        <div class="w-8 h-8 rounded-full bg-dark-card border border-glass-border flex items-center justify-center overflow-hidden">
                             <i class="text-text-secondary text-sm" data-fa-i2svg=""><svg class="svg-inline--fa fa-user" aria-hidden="true" focusable="false" data-prefix="fas" data-icon="user" role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512" data-fa-i2svg=""><path fill="currentColor" d="M224 256A128 128 0 1 0 224 0a128 128 0 1 0 0 256zm-45.7 48C79.8 304 0 383.8 0 482.3C0 498.7 13.3 512 29.7 512l388.6 0c16.4 0 29.7-13.3 29.7-29.7C448 383.8 368.2 304 269.7 304l-91.4 0z"></path></svg></i>
                        </div>
                        <a href="P-LOGIN.html" class="text-sm text-text-secondary hover:text-primary transition-colors">登录</a>
                        <span class="text-dark-border">|</span>
                        <a href="P-REGISTER.html" class="text-sm text-text-secondary hover:text-primary transition-colors">注册</a>
                    </div>
                `;
            }

            // 今日学习内容 (视频 + 应对措施)
            var videoContainer = document.getElementById('video-container');
            var videoCover = document.getElementById('video-cover');
            var videoThumbnail = document.getElementById('video-thumbnail');
            var videoLoadingText = document.getElementById('video-loading-text');
            var videoPlayerWrapper = document.getElementById('video-player-wrapper');
            
            var riskEl = document.getElementById('risk-point-content');
            var legalEl = document.getElementById('legal-basis-content');
            var adviceEl = document.getElementById('practical-advice-content');

            if (typeof window.fetchDailyLearning === 'function') {
                console.log("Fetching daily learning data...");
                window.fetchDailyLearning().then(function (data) {
                    console.log("Daily learning data received:", data);
                    
                    if (!data) {
                        console.warn("No daily learning data found.");
                        if (videoLoadingText) videoLoadingText.textContent = '暂无今日视频';
                        if (riskEl) riskEl.textContent = '暂无数据';
                        if (legalEl) legalEl.textContent = '暂无数据';
                        if (adviceEl) adviceEl.textContent = '暂无数据';
                        return;
                    }

                    // === Load Video Cover & Setup Player ===
                    if (videoContainer && data.video_url) {
                        // 1. 设置封面图
                        if (videoThumbnail) {
                            // 优先使用数据库里的封面，如果没有则使用默认图
                            // 注意：数据库字段名必须完全匹配，区分大小写
                            var coverUrl = data.thumbnail_url || 'https://s.coze.cn/image/tPdTjh-V2X0/';
                            console.log("Setting video thumbnail:", coverUrl);
                            
                            videoThumbnail.src = coverUrl;
                            videoThumbnail.classList.remove('hidden');
                            
                            // 错误处理：如果图片加载失败，回退到默认图
                            videoThumbnail.onerror = function() {
                                console.warn("Thumbnail load failed, using default.");
                                this.src = 'https://s.coze.cn/image/tPdTjh-V2X0/';
                            };
                        }
                        
                        // 2. 隐藏加载文字
                        if (videoLoadingText) videoLoadingText.style.display = 'none';

                        // 3. 绑定点击事件
                        var isPlaying = false;
                        videoContainer.addEventListener('click', function() {
                            if (isPlaying) return;
                            isPlaying = true;
                            console.log("Video clicked, starting playback...");

                            // 隐藏封面
                            if(videoCover) videoCover.style.display = 'none';
                            
                            // 显示播放器容器
                            if(videoPlayerWrapper) {
                                videoPlayerWrapper.classList.remove('hidden');
                                
                                // 处理 B站 链接 (添加 autoplay)
                                var videoSrc = data.video_url;
                                // 简单判断是否已有参数
                                var separator = videoSrc.includes('?') ? '&' : '?';
                                // B站 iframe 参数通常是 &autoplay=1，通用的是 ?autoplay=1
                                // 这里为了保险，我们根据 URL 特征处理
                                if (videoSrc.includes('player.bilibili.com')) {
                                    // B站特定优化：由用户点击触发，通常不需要额外参数，或者 &autoplay=1
                                    if (!videoSrc.includes('autoplay')) {
                                        videoSrc += '&autoplay=1';
                                    }
                                } else {
                                    videoSrc += separator + 'autoplay=1';
                                }
                                
                                console.log("Loading video iframe:", videoSrc);
                                videoPlayerWrapper.innerHTML = '<iframe class="w-full h-full" src="' + videoSrc + '" allow="autoplay; fullscreen" allowfullscreen frameborder="0" scrolling="no"></iframe>';
                            }
                        });
                    } else {
                        console.warn("Video container or URL missing");
                    }

                    // Load Countermeasures
                    if (riskEl) riskEl.textContent = data.risk_point || '暂无内容';
                    if (legalEl) legalEl.textContent = data.legal_basis || '暂无内容';
                    if (adviceEl) adviceEl.textContent = data.practical_advice || '暂无内容';

                }).catch(function (err) {
                    console.error('Fetch daily learning error:', err);
                    if (videoLoadingText) {
                        videoLoadingText.textContent = '加载失败';
                        videoLoadingText.classList.add('text-red-500');
                    }
                });
            }

            // Load recommended cases for "For You" section - 首页已移除推荐区，保�?API 调用供它处使�?            if (typeof window.fetchCases === 'function') {
                window.fetchCases({ page: 1, pageSize: 3 }).then(function(res) {
                    var cases = res.data || [];
                    var fieldLabels = { labor: '\u52b3\u52a8\u6cd5', marriage: '\u5a5a\u59fb\u6cd5', contract: '\u5408\u540c\u6cd5', consumer: '\u6d88\u8d39\u8005\u6743\u76ca' };
                    function fmt(n) { return n >= 10000 ? (n/10000).toFixed(1) + '\u4e07\u4eba\u5b66\u4e60' : n >= 1000 ? (n/1000).toFixed(1) + '\u5343\u4eba\u5b66\u4e60' : n + '\u4eba\u5b66\u4e60'; }
                    [1,2,3].forEach(function(i) {
                        var card = document.getElementById('recommend-case-' + i);
                        if (!card || !cases[i-1]) return;
                        var c = cases[i-1];
                        var caseId = c.slug || c.id;
                        card.dataset.caseId = caseId;
                        var titleEl = card.querySelector('h4');
                        var descEl = card.querySelector('p.text-sm.text-text-secondary');
                        var tagEl = card.querySelector('.text-xs.bg-secondary');
                        var countEl = card.querySelector('.text-xs.text-text-secondary:last-of-type');
                        if (titleEl) titleEl.textContent = c.title || titleEl.textContent;
                        if (descEl) descEl.textContent = c.summary || descEl.textContent;
                        if (tagEl) tagEl.textContent = fieldLabels[c.field] || c.field || tagEl.textContent;
                        if (countEl) countEl.textContent = fmt(c.learner_count || 0);
                    });
                }).catch(function() {});
            }

            // 搜索框焦点效�?            const searchInput = document.querySelector('#global-search');
            if (searchInput) {
                searchInput.addEventListener('focus', function() {
                    this.parentElement.classList.add('ring-2', 'ring-secondary', 'ring-opacity-50');
                });
                searchInput.addEventListener('blur', function() {
                    this.parentElement.classList.remove('ring-2', 'ring-secondary', 'ring-opacity-50');
                });
                
                // 搜索功能
                searchInput.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        const keyword = this.value.trim();
                        if (keyword) {
                            window.location.href = `P-SEARCH_RESULT.html?keyword=${encodeURIComponent(keyword)}`;
                        }
                    }
                });
            }

            // 顶部导航点击事件
            document.querySelector('#nav-home-top').addEventListener('click', function(e) {
                e.preventDefault();
                // 已在首页，无需操作
            });

            document.querySelector('#nav-cases-top').addEventListener('click', function(e) {
                e.preventDefault();
                window.location.href = 'P-CASE_LIST.html';
            });

            document.querySelector('#nav-circles-top').addEventListener('click', function(e) {
                e.preventDefault();
                window.location.href = 'P-CIRCLE_LIST.html';
            });

            document.querySelector('#nav-questions-top').addEventListener('click', function(e) {
                e.preventDefault();
                window.location.href = 'P-QUESTION_BANK.html';
            });

            // 左侧菜单点击事件
            document.querySelector('#nav-home').addEventListener('click', function(e) {
                e.preventDefault();
                // 已在首页，无需操作
            });

            document.querySelector('#nav-cases').addEventListener('click', function(e) {
                e.preventDefault();
                window.location.href = 'P-CASE_LIST.html';
            });

            document.querySelector('#nav-circles').addEventListener('click', function(e) {
                e.preventDefault();
                window.location.href = 'P-CIRCLE_LIST.html';
            });

            document.querySelector('#nav-questions').addEventListener('click', function(e) {
                e.preventDefault();
                window.location.href = 'P-QUESTION_BANK.html';
            });


            document.querySelector('#nav-materials').addEventListener('click', function(e) {
                e.preventDefault();
                window.location.href = 'P-LEARNING_MATERIAL.html';
            });

            document.querySelector('#nav-ranking').addEventListener('click', function(e) {
                e.preventDefault();
                window.location.href = 'P-RANKING.html';
            });

            document.querySelector('#nav-profile').addEventListener('click', function(e) {
                e.preventDefault();
                window.location.href = 'P-USER_CENTER.html';
            });

            document.querySelector('#nav-settings').addEventListener('click', function(e) {
                e.preventDefault();
                window.location.href = 'P-SETTINGS.html';
            });

            // 推荐案例点击效果
            const recommendCases = document.querySelectorAll('[id^="recommend-case-"]');
            recommendCases.forEach(caseCard => {
                caseCard.addEventListener('click', function() {
                    const caseId = this.dataset.caseId;
                    window.location.href = `P-CASE_DETAIL.html?caseId=${caseId}`;
                });
            });

            // 圈子点击效果
            const circles = document.querySelectorAll('[id^="circle-"]');
            circles.forEach(circle => {
                circle.addEventListener('click', function() {
                    const circleId = this.dataset.circleId;
                    window.location.href = `P-CIRCLE_DETAIL.html?circleId=${circleId}`;
                });
            });

            // 快速操作按钮已从首页移除，此处保留供其他页复用
            var quickLearn = document.querySelector('#quick-learn');
            if (quickLearn) quickLearn.addEventListener('click', function() { window.location.href = 'P-CASE_LIST.html'; });
            var quickPractice = document.querySelector('#quick-practice');
            if (quickPractice) quickPractice.addEventListener('click', function() { window.location.href = 'P-QUESTION_BANK.html'; });
            var quickDiscuss = document.querySelector('#quick-discuss');
            if (quickDiscuss) quickDiscuss.addEventListener('click', function() { window.location.href = 'P-CIRCLE_LIST.html'; });

            // 用户头像点击效果
            document.querySelector('#user-avatar').addEventListener('click', function() {
                window.location.href = 'P-USER_CENTER.html';
            });

            // 通知按钮点击效果
            document.querySelector('#notification-btn').addEventListener('click', function() {
                console.log('显示通知列表');
                // 这里可以添加显示通知的逻辑
            });
        });
    </script>

</body></html>
